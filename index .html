<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page - Proyecto Integrado</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================================ -->
  <!-- 🎨 SECCIÓN DEL FRONTEND ARCHITECT                           -->
  <!-- Rama: feature/header                                         -->
  <!-- Responsabilidad: Header principal y barra de navegación      -->
  <!-- ============================================================ -->

  <header id="header">
    <nav id="navbar">
      <!-- FRONTEND ARCHITECT: Agrega aquí el logo y los links de navegación -->
      <!-- Ejemplo de estructura sugerida:
        <div class="logo">NombreEmpresa</div>
        <ul class="nav-links">
          <li><a href="#hero">Inicio</a></li>
          <li><a href="#servicios">Servicios</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      -->
    </nav>
  </header>

  <!-- ============================================================ -->
  <!-- 📝 SECCIÓN DEL CONTENT SPECIALIST                           -->
  <!-- Rama: feature/hero                                           -->
  <!-- Responsabilidad: Sección Hero / Portada principal           -->
  <!-- ============================================================ -->

  <section id="hero">
      <div class="hero-content">
        <h1>Bienvenidos a GOAT</h1>
        <p>Tu solución deportiva de confianza.</p>
        <a href="#servicios" class="btn-cta">Ver Servicios</a>
      </div>
  </section>

  <!-- ============================================================ -->
  <!-- 🧩 SECCIÓN DEL UI COMPONENT DEV                             -->
  <!-- Rama: feature/servicios                                      -->
  <!-- Responsabilidad: Grilla de tarjetas/cards de servicios       -->
  <!-- ============================================================ -->

  <section id="servicios">
    <h2>Nuestros Servicios</h2>
    <div class="cards-grid">
      <!-- UI COMPONENT DEV: Agrega aquí las tarjetas de servicios -->
      <!-- Ejemplo de estructura sugerida (repite por cada servicio):
        <div class="card">
          <div class="card-icon">🚀</div>
          <h3>Nombre del Servicio</h3>
          <p>Descripción breve del servicio ofrecido.</p>
        </div>
      -->
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- 👑 SECCIÓN DEL TECH LEAD                                    -->
  <!-- Rama: feature/footer                                         -->
  <!-- Responsabilidad: Footer y sección de contacto               -->
  <!-- ============================================================ -->

  <section id="contacto">
    <!-- TECH LEAD: Agrega aquí el formulario o info de contacto -->
    <!-- Ejemplo de estructura sugerida:
      <h2>Contáctanos</h2>
      <form class="contact-form">
        <input type="text" placeholder="Tu nombre">
        <input type="email" placeholder="Tu email">
        <textarea placeholder="Tu mensaje"></textarea>
        <button type="submit">Enviar</button>
      </form>
    -->
  </section>

  <footer id="footer">
    <!-- TECH LEAD: Agrega aquí el pie de página con derechos y redes sociales -->
    <!-- Ejemplo de estructura sugerida:
      <p>&copy; 2025 NombreEmpresa. Todos los derechos reservados.</p>
      <div class="social-links">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
      </div>
    -->
  </footer>

  <!-- ============================================================ -->
  <!-- 💅 NOTA PARA EL STYLES MANAGER                              -->
  <!-- Rama: feature/estilos                                        -->
  <!-- Responsabilidad: Archivo style.css completo                  -->
  <!-- Recuerda coordinar con el equipo los nombres de las clases   -->
  <!-- que uses en el CSS para que coincidan con el HTML            -->
  <!-- ============================================================ -->

</body>
</html>
